<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Dynamic Storefront</h1>
            <div class="cart-icon">
                <span id="cart-count">🛒 Cart (0)</span>
                <span id="cart-total">$0.00</span>
            </div>
        </div>
    </header>
    
    <div class="banner">
        <h2>Welcome to Storefront</h2>
        <p>Discover the best products at unbeatable prices. Fast shipping and excellent support.</p>
    </div>

    <main>
        <div class="container">
            <h2 class="section-title">Latest Products</h2>
            <div id="product-grid" class="grid">
                <!-- Products will be injected here by app.js -->
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
